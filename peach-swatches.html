<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    body {
      font: 16px Arial, sans-serif;
      background: #1a1a1a;
      color: #f2f2f2;
      padding: 20px;
    }

    .color-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, 100px);
      gap: 20px;
      max-width: 100%;
    }

    .color-swatch {
      border: 1px solid #eee;
      border-radius: 4px;
      padding: 20px;
      text-align: center;
    }

    .color-swatch .watch {
      display: block;
      width: 100%;
      height: 100px;
      border-radius: 2px;
      margin-bottom: 10px;
    }

    .watch {
      display: inline-block;
      padding: 6px 12px;
      border: 1px solid #333;
      border-radius: 3px;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
    }

    .watch:hover {
      background: #333;
      color: #fff;
    }
  </style>
